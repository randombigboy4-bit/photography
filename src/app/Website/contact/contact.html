<div class="py-5 bg-light">
  <div class="container">
    <div class="carousel">
      <div class="slides">
        <div class="slide" *ngFor="let slide of slides">
          <img [src]="slide.img" />
          <div class="text">{{ slide.label }}</div>
        </div>
      </div>
    </div>

    <div class="row g-4 mt-4">
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="fw-bold mb-3">Get In Contact With Us</h5>

            <form [formGroup]="contactForm" (ngSubmit)="submitForm()">
              <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input
                  type="text"
                  class="form-control"
                  formControlName="fullName"
                  placeholder="Your name"
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input
                  type="tel"
                  class="form-control"
                  formControlName="phoneNumber"
                  placeholder="Your phone number"
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input
                  type="email"
                  class="form-control"
                  formControlName="email"
                  placeholder="Your email"
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Event Type</label>
                <select class="form-select" formControlName="eventType">
                  <option value="">Select Event</option>
                  <option value="wedding">Wedding</option>
                  <option value="pre-wedding">Pre-Wedding</option>
                  <option value="maternity">Maternity</option>
                  <option value="child-photography">Child Photography</option>
                  <option value="other">Other</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label">Message</label>
                <textarea
                  class="form-control"
                  rows="4"
                  formControlName="message"
                  placeholder="Tell us about your event"
                ></textarea>
              </div>

              <button type="submit" class="btn btn-primary w-100">Submit Enquiry</button>

              <div *ngIf="successMessage" class="mt-2 text-success">{{ successMessage }}</div>
              <div *ngIf="errorMessage" class="mt-2 text-danger">{{ errorMessage }}</div>
            </form>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card h-100 border-0">
          <div class="card-body">
            <h3 class="fw-bold mb-3">RAFI PHOTOGRAPHY</h3>

            <p>
              D – Block, Jain Carlton Creek, Beside Delhi Public School, Khajaguda, Lanco Hills
              Road, Manikonda, Hyderabad, Telangana 500089
            </p>
            <p>Phone: +91 8688660606</p>
            <p>Email: rafiphotography@gmail.com</p>

            <div class="circle-wrapper">
              <div class="big-circle">
                <img [src]="contactImages.main" />
              </div>

              <div class="small-circle">
                <img [src]="contactImages.small" />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
