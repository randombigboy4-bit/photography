<div class="login-wrapper">
  <div class="login-card">
    <h2>Welcome Back</h2>
    <p class="subtitle">
      Login to capture moments
      <i class="bi bi-camera-fill"></i>
    </p>

    <form [formGroup]="loginForm" (ngSubmit)="adminLogin()">
      <div class="input-group">
        <input type="email" formControlName="admin_mail" required />
        <label>Email</label>
      </div>

      <div class="input-group">
        <input type="password" formControlName="admin_password" required />
        <label>Password</label>
      </div>

      <button type="submit" [disabled]="loginForm.invalid" >Login</button>

      <p class="register-text">
        Don’t have an account?
        <a routerLink="/register">Register</a>
      </p>
    </form>
  </div>
</div>
